<div class="stone-filter-box mb-4">
    <form method="get" class="row g-3 align-items-end">
        <div class="col-md-3">
            <label class="form-label-stone small">Bodega Origen/Destino</label>
            <select name="bodega" class="form-select-stone">
                <option value="">Todas las bodegas</option>
                {% for bod in bodegas %}
                <option value="{{ bod.id }}" {% if request.GET.bodega == bod.id|stringformat:"s" %}selected{% endif %}>
                    {{ bod.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label-stone small">Desde</label>
            <input type="date" name="fecha_desde" class="form-control-stone" value="{{ request.GET.fecha_desde }}">
        </div>
        <div class="col-md-2">
            <label class="form-label-stone small">Hasta</label>
            <input type="date" name="fecha_hasta" class="form-control-stone" value="{{ request.GET.fecha_hasta }}">
        </div>
        <div class="col-md-2">
            <label class="form-label-stone small">Tipo</label>
            <select name="tipo" class="form-select-stone">
                <option value="">Todos</option>
                <option value="entrada" {% if request.GET.tipo == 'entrada' %}selected{% endif %}>Entradas</option>
                <option value="salida" {% if request.GET.tipo == 'salida' %}selected{% endif %}>Salidas</option>
            </select>
        </div>
        <div class="col-md-3">
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-sm px-4 fw-bold shadow-sm w-100" style="background: var(--stone-primary); color: white; border-radius: 20px; border: none; height: 38px;">
                    <i class="fas fa-filter me-2"></i> FILTRAR
                </button>
                <a href="{% url 'inventario:ajustes_list' %}" class="btn btn-sm px-4 fw-bold shadow-sm btn-limpiar w-100" style="border-radius: 20px; height: 38px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-times me-2"></i> LIMPIAR
                </a>
            </div>
        </div>
    </form>
</div>
