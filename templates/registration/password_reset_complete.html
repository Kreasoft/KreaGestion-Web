{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Contraseña Cambiada! - GestionCloud</title>
    <link rel="icon" type="image/png" href="{% static 'image/LogoCloud-5.png' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background-color: #2b1d1a; }
        .login-wrapper { display: flex; width: 100%; height: 100vh; }
        .login-image-side { 
            width: 60%; height: 100%; background-image: url("{% static 'image/FondoCloud.png' %}"); 
            background-size: cover; background-position: center; position: relative; 
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 4rem; z-index: 10;
        }
        .login-image-side::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%); z-index: 1;}
        .login-form-side { width: 40%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #2b1d1a; position: relative; }
        .login-card { 
            width: 100%; max-width: 420px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.18); padding: 3rem 2.5rem; border-radius: 20px; z-index: 2; text-align: center; color: white;
        }
        .btn-primary-custom {
            background: linear-gradient(135deg, #D2691E 0%, #8B4513 100%); border: none; color: white; 
            padding: 0.9rem; font-size: 1rem; font-weight: 600; border-radius: 0.5rem; width: 100%; margin-top: 1.5rem;
        }
        .text-muted-glass { color: rgba(255, 255, 255, 0.6) !important; }
        .glass-logo { filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(255, 255, 255, 0.9)); }
        @media (max-width: 768px) { .login-image-side { display: none; } .login-form-side { width: 100%; } }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-image-side"></div>
        <div class="login-form-side">
            <div class="login-card">
                <div class="mb-4">
                    <img src="{% static 'image/LogoCloud-5.png' %}" alt="GestionCloud Logo" class="glass-logo" style="max-width: 150px; height: auto;">
                </div>
                <div class="mb-4">
                    <i class="fas fa-check-circle fa-4x mb-3" style="color: #28a745;"></i>
                    <h3 class="fw-bold mb-2">¡Contraseña Cambiada!</h3>
                    <p class="text-muted-glass">Haz clic en el botón para iniciar sesión con tu nueva contraseña.</p>
                </div>
                <a href="{% url 'login' %}" class="btn btn-primary-custom" style="text-decoration: none;">INICIAR SESIÓN</a>
            </div>
        </div>
    </div>
</body>
</html>
