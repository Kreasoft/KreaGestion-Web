<style>
    /* Efectos Estilo PyQt / Premium Desktop */
    @keyframes spring-in {
        0% { transform: scale(0.9) translateY(40px); opacity: 0; }
        70% { transform: scale(1.02) translateY(-5px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    .modal.fade .modal-dialog {
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal.show .modal-dialog {
        animation: spring-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-backdrop.show {
        backdrop-filter: blur(4px);
        background-color: rgba(45, 55, 72, 0.4);
    }

    .modal-content-premium {
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(139, 115, 85, 0.1);
        background: rgba(250, 250, 248, 0.95);
        backdrop-filter: blur(10px);
    }

    .custom-premium-tabs .nav-link {
        border: none;
        color: #7f8c8d;
        font-weight: 500;
        padding: 12px 20px;
        transition: all 0.3s ease;
        border-bottom: 3px solid transparent;
        background: none !important;
    }
    .custom-premium-tabs .nav-link.active {
        color: #8B7355 !important;
        border-bottom-color: #8B7355 !important;
        font-weight: 600;
    }
    .custom-premium-tabs .nav-link:hover:not(.active) {
        border-bottom-color: #D4C4A8;
        color: #6F5B44;
    }
    .modal-tab-content {
        background: rgba(255, 255, 255, 0.4);
        padding: 25px;
        border-radius: 0 0 15px 15px;
    }

    #modalCliente .form-control, #modalCliente .form-select {
        border: 1px solid #E2E8F0;
        background: rgba(255, 255, 255, 0.8);
        border-radius: 8px;
        padding: 10px 14px;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #modalCliente .form-control:focus, #modalCliente .form-select:focus {
        border-color: #8B7355;
        background: #fff;
        box-shadow: 0 0 0 4px rgba(139, 115, 85, 0.15);
        transform: translateY(-1px);
    }

    #modalCliente .input-group-text {
        background-color: #F8FAFC;
        border-color: #E2E8F0;
        color: #64748B;
        border-radius: 8px 0 0 8px;
    }
</style>

<!-- Modal para Crear/Editar Cliente (Estilo Piedra Premium) -->
<div class="modal fade" id="modalCliente" tabindex="-1" aria-labelledby="modalClienteLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content modal-content-premium">
            <!-- Header con Gradient Piedra -->
            <div class="modal-header border-0 p-4" style="background: linear-gradient(135deg, #efebe9 0%, #d7ccc8 100%); border-bottom: 2px solid #d7ccc8 !important;">
                <div class="d-flex align-items-center w-100">
                    <div class="rounded-circle d-flex align-items-center justify-content-center me-3 shadow-sm" style="width: 45px; height: 45px; background: rgba(255,255,255,0.5); backdrop-filter: blur(5px);">
                        <i id="modalClienteIcon" class="fas fa-user-edit" style="color: #5D4037; font-size: 1.2rem;"></i>
                    </div>
                    <h5 class="modal-title fw-normal mb-0" id="modalClienteTitle" style="color: #5D4037; letter-spacing: -0.5px; font-family: 'Poppins', sans-serif;">Nuevo Cliente</h5>
                    <button type="button" class="btn-close ms-auto shadow-none" data-bs-dismiss="modal" aria-label="Close" style="filter: sepia(1) saturate(2) hue-rotate(330deg);"></button>
                </div>
            </div>
            
            <div class="modal-body p-0" style="background-color: #FAFAF8;">
                <!-- Pestañas Premium -->
                <ul class="nav nav-tabs custom-premium-tabs px-4 pt-2" id="modalClienteTabs" role="tablist" style="background: #fdfcfb; border-bottom: 1px solid #eee;">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="basicos-tab" data-bs-toggle="tab" data-bs-target="#modal-datos-basicos" type="button" role="tab">
                            <i class="fas fa-id-card me-2"></i>Datos Básicos
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="contacto-tab" data-bs-toggle="tab" data-bs-target="#modal-datos-contacto" type="button" role="tab">
                            <i class="fas fa-users me-2"></i>Contactos Empresa
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="comercial-tab" data-bs-toggle="tab" data-bs-target="#modal-datos-comerciales" type="button" role="tab">
                            <i class="fas fa-briefcase me-2"></i>Comercial
                        </button>
                    </li>
                </ul>

                <form id="formNuevoCliente" style="padding: 25px;">
                    {% csrf_token %}
                    <input type="hidden" name="cliente_id" id="m_cliente_id">
                    <div class="tab-content" id="modalClienteTabsContent">
                        <!-- Pestaña: Datos Básicos -->
                    <div class="tab-content border-start border-end border-bottom p-4" id="modalTabContent" style="background-color: white; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px;">
                        <!-- Pestaña: Identificación (Básicos + Dirección) -->
                        <div class="tab-pane fade show active" id="modal-datos-basicos" role="tabpanel">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">RUT *</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-fingerprint text-muted"></i></span>
                                        <input type="text" name="rut" id="m_cliente_rut" class="form-control" placeholder="12.345.678-9" required>
                                    </div>
                                </div>
                                <div class="col-md-8 mb-3">
                                    <label class="form-label fw-bold">Nombre o Razón Social *</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-user text-muted"></i></span>
                                        <input type="text" name="nombre" id="m_cliente_nombre" class="form-control" placeholder="Nombre completo" required>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Tipo Cliente</label>
                                    <select name="tipo_cliente" id="m_cliente_tipo" class="form-select form-select-sm">
                                        <option value="consumidor_final">Consumidor Final</option>
                                        <option value="contribuyente">Contribuyente</option>
                                        <option value="exento">Exento de IVA</option>
                                        <option value="extranjero">Extranjero</option>
                                    </select>
                                </div>
                                <div class="col-md-5 mb-3">
                                    <label class="form-label fw-bold">Giro</label>
                                    <input type="text" name="giro" id="m_cliente_giro" class="form-select form-select-sm" placeholder="Giro comercial">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label class="form-label fw-bold">Estado</label>
                                    <select name="estado" id="m_cliente_estado" class="form-select form-select-sm">
                                        <option value="activo">Activo</option>
                                        <option value="inactivo">Inactivo</option>
                                        <option value="suspendido">Suspendido</option>
                                        <option value="moroso">Moroso</option>
                                    </select>
                                </div>
                                
                                <div class="col-12"><hr class="my-2"></div>
                                
                                <div class="col-md-12 mb-3">
                                    <label class="form-label fw-bold">Dirección *</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-map-marker-alt text-muted"></i></span>
                                        <input type="text" name="direccion" id="m_cliente_direccion" class="form-control" placeholder="Calle #123" required>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Comuna *</label>
                                    <input type="text" name="comuna" id="m_cliente_comuna" class="form-control form-control-sm" placeholder="Comuna" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Ciudad *</label>
                                    <input type="text" name="ciudad" id="m_cliente_ciudad" class="form-control form-control-sm" placeholder="Ciudad" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Teléfono *</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-phone text-muted"></i></span>
                                        <input type="text" name="telefono" id="m_cliente_telefono" class="form-control" placeholder="+56 9 ..." required>
                                    </div>
                                </div>
                                <div class="col-md-12 mb-0">
                                    <label class="form-label fw-bold">Email</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-envelope text-muted"></i></span>
                                        <input type="email" name="email" id="m_cliente_email" class="form-control" placeholder="correo@ejemplo.com">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Pestaña: Contactos (Personas) -->
                        <div class="tab-pane fade" id="modal-datos-contacto" role="tabpanel">
                            <div class="text-center py-4">
                                <i class="fas fa-users-cog fa-3x text-muted mb-3"></i>
                                <h5>Contactos de la Empresa</h5>
                                <p class="text-muted small">Aquí podrá gestionar las personas de contacto vinculadas a esta empresa cliente.</p>
                                <div id="lista-contactos-cliente" class="mt-3">
                                    <!-- Se cargará dinámicamente o placeholder -->
                                    <button type="button" class="btn btn-sm btn-outline-secondary" disabled>
                                        <i class="fas fa-plus me-1"></i>Añadir Contacto (Próximamente)
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Pestaña: Comercial (Otros Datos) -->
                        <div class="tab-pane fade" id="modal-datos-comerciales" role="tabpanel">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Límite de Crédito</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-dollar-sign text-muted"></i></span>
                                        <input type="number" name="limite_credito" id="m_cliente_limite" class="form-control" value="0">
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Plazo de Pago (Días)</label>
                                    <div class="input-group input-group-sm">
                                        <span class="input-group-text bg-white"><i class="fas fa-calendar-day text-muted"></i></span>
                                        <input type="number" name="plazo_pago" id="m_cliente_plazo" class="form-control" value="30">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small opacity-75">Vendedor Asignado</label>
                                    <select name="vendedor" id="m_cliente_vendedor" class="form-select form-select-sm">
                                        <option value="">Sin vendedor asignado</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold small opacity-75">Ruta de Despacho</label>
                                    <select name="ruta" id="m_cliente_ruta" class="form-select form-select-sm">
                                        <option value="">Sin ruta asignada</option>
                                    </select>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold small opacity-75">Descuento por Defecto (%)</label>
                                    <div class="input-group input-group-sm">
                                        <input type="number" name="descuento_porcentaje" id="m_cliente_descuento" class="form-control" step="0.01" value="0.00">
                                        <span class="input-group-text">%</span>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold small opacity-75">
                                        <i class="fas fa-comment-alt me-1"></i>Observaciones
                                    </label>
                                    <textarea name="observaciones" id="m_cliente_obs" class="form-control" rows="3" placeholder="Notas internas..."></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer" style="background-color: #f8f9fa; border-top: 1px solid #e9ecef; padding: 15px 25px;">
                <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal" style="border-radius: 8px;">Cancelar</button>
                <button type="button" id="btnGuardarClienteModal" class="btn px-4" style="background: linear-gradient(135deg, #8B7355 0%, #6F5B44 100%); color: white; border: none; border-radius: 8px; font-weight: 600; box-shadow: 0 4px 6px rgba(139, 115, 85, 0.2);">
                    <i class="fas fa-save me-2"></i>Guardar Cliente
                </button>
            </div>
        </div>
    </div>
</div>

<style>
/* Estilos para pestañas clásicas */
.custom-classic-tabs .nav-link {
    border: 1px solid transparent;
    border-bottom: none;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    color: #6F5B44;
    font-weight: 500;
    margin-right: 5px;
    padding: 10px 18px;
    transition: all 0.2s;
    background: #e4ddd6;
}

.custom-classic-tabs .nav-link:hover {
    background: #d4c4a8;
    color: #5D4037;
    border-color: #D4C4A8;
    border-bottom-color: transparent;
}

.custom-classic-tabs .nav-link.active {
    background: #FAFAF8 !important;
    color: #8B7355 !important;
    border: 2px solid #D4C4A8 !important;
    border-bottom: 3px solid #FAFAF8 !important; /* Tapar el borde inferior del ul */
    margin-bottom: -2px; /* Alineación perfecta con el borde del ul */
    font-weight: 700;
}

/* Efectos de input focus Piedra */
#modalCliente .form-control:focus, #modalCliente .form-select:focus {
    border-color: #8B7355;
    box-shadow: 0 0 0 0.25rem rgba(139, 115, 85, 0.25);
}

#modalCliente .input-group-text {
    border-color: #dee2e6;
}
</style>

<script>
/**
 * Lógica para el modal de cliente (Versión Definitiva Robustecida)
 */

// Cargar vendedores al inicio
function cargarVendedoresModal() {
    const select = document.getElementById('m_cliente_vendedor');
    if (select && select.options.length <= 1) {
        fetch('/clientes/ajax/vendedores/')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                data.vendedores.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.id;
                    opt.textContent = v.nombre;
                    select.appendChild(opt);
                });
            }
        }).catch(err => console.error('Error cargando vendedores:', err));
    }
}

// Cargar rutas
function cargarRutasModal() {
    const select = document.getElementById('m_cliente_ruta');
    if (select && select.options.length <= 1) {
        fetch('/pedidos/ajax/rutas/')
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                data.rutas.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r.id;
                    opt.textContent = `${r.codigo} - ${r.nombre}`;
                    select.appendChild(opt);
                });
            }
        }).catch(err => console.error('Error cargando rutas:', err));
    }
}

// Abrir para NUEVO cliente
window.abrirModalNuevoCliente = function(rut = "") {
    const modalEl = document.getElementById('modalCliente');
    if (!modalEl) return;
    
    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
    const form = document.getElementById('formNuevoCliente');
    
    if (form) {
        form.reset();
        document.getElementById('m_cliente_id').value = "";
    }
    
    cargarVendedoresModal();
    cargarRutasModal();
    
    document.getElementById('modalClienteTitle').innerText = "Nuevo Cliente";
    document.getElementById('modalClienteIcon').className = "fas fa-user-plus me-2";
    
    if (rut) document.getElementById('m_cliente_rut').value = rut;

    // Resetear a la primera pestaña
    const firstTab = document.querySelector('#modalClienteTabs button[data-bs-target="#modal-datos-basicos"]');
    if (firstTab) bootstrap.Tab.getOrCreateInstance(firstTab).show();
    
    // Limpiar lista de contactos
    const container = document.getElementById('lista-contactos-cliente');
    if (container) container.innerHTML = '<div class="text-muted p-3">Guarde el cliente primero para gestionar sus contactos.</div>';
    
    modal.show();
};

// Abrir para EDITAR cliente
window.abrirModalEditarCliente = function(id) {
    const modalEl = document.getElementById('modalCliente');
    if (!modalEl) return;
    
    const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
    const form = document.getElementById('formNuevoCliente');
    
    if (form) form.reset();
    document.getElementById('m_cliente_id').value = id;
    
    cargarVendedoresModal();
    cargarRutasModal();
    
    document.getElementById('modalClienteTitle').innerText = "Editar Cliente";
    document.getElementById('modalClienteIcon').className = "fas fa-user-edit me-2";

    // Cargar datos vía AJAX
    fetch(`/clientes/ajax/${id}/`)
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(data => {
        if (data.success && data.cliente) {
            const c = data.cliente;
            const fields = {
                'm_cliente_rut': c.rut,
                'm_cliente_nombre': c.nombre,
                'm_cliente_giro': c.giro,
                'm_cliente_tipo': c.tipo_cliente,
                'm_cliente_estado': c.estado,
                'm_cliente_direccion': c.direccion,
                'm_cliente_comuna': c.comuna,
                'm_cliente_ciudad': c.ciudad,
                'm_cliente_telefono': c.telefono,
                'm_cliente_email': c.email,
                'm_cliente_limite': c.limite_credito,
                'm_cliente_plazo': c.plazo_pago,
                'm_cliente_vendedor': c.vendedor,
                'm_cliente_ruta': c.ruta,
                'm_cliente_descuento': c.descuento_porcentaje,
                'm_cliente_obs': c.observaciones
            };
            for (let fId in fields) {
                const el = document.getElementById(fId);
                if (el) el.value = (fields[fId] !== null && fields[fId] !== undefined) ? fields[fId] : "";
            }
            
            cargarContactosModal(id);
            modal.show();
        }
    })
    .catch(err => {
        if (window.Swal) Swal.fire('Error', 'No se pudieron cargar los datos del cliente', 'error');
    });
};

// Cargar lista de contactos
window.cargarContactosModal = function(clienteId) {
    const container = document.getElementById('lista-contactos-cliente');
    if (!container) return;
    
    container.innerHTML = '<div class="text-center p-3"><div class="spinner-border spinner-border-sm text-primary"></div></div>';
    
    fetch(`/clientes/ajax/${clienteId}/contactos/`)
    .then(r => r.json())
    .then(data => {
        if (data.success && data.contactos.length > 0) {
            let html = '<div class="table-responsive"><table class="table table-sm table-hover align-middle" style="font-size: 0.85rem;">';
            html += '<thead class="table-light"><tr><th>Nombre</th><th>Cargo</th><th>Teléfono</th><th>Email</th></tr></thead><tbody>';
            data.contactos.forEach(c => {
                html += `<tr>
                    <td class="fw-bold text-start">${c.nombre} ${c.es_contacto_principal ? '<span class="badge bg-primary ms-1" style="font-size: 0.6rem;">Principal</span>' : ''}</td>
                    <td class="text-start">${c.cargo || '-'}</td>
                    <td class="text-start">${c.celular || c.telefono || '-'}</td>
                    <td class="text-start">${c.email || '-'}</td>
                </tr>`;
            });
            html += '</tbody></table></div>';
            html += `<button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="Swal.fire('Gestión de Contactos','Esta funcionalidad se habilitará en la próxima actualización.','info')"><i class="fas fa-plus me-1"></i>Añadir Contacto</button>`;
            container.innerHTML = html;
        } else {
            container.innerHTML = `
                <div class="text-muted p-3">No hay contactos registrados.</div>
                <button type="button" class="btn btn-sm btn-outline-primary" onclick="Swal.fire('Gestión de Contactos','Esta funcionalidad se habilitará en la próxima actualización.','info')"><i class="fas fa-plus me-1"></i>Añadir Primer Contacto</button>
            `;
        }
    })
    .catch(() => { container.innerHTML = '<div class="text-danger small p-3">Error al cargar contactos.</div>'; });
};

// Eventos al cargar el DOM
document.addEventListener('DOMContentLoaded', function() {
    const btnGuardar = document.getElementById('btnGuardarClienteModal');
    const form = document.getElementById('formNuevoCliente');
    
    if (btnGuardar && form) {
        btnGuardar.addEventListener('click', function() {
            if (!form.checkValidity()) { form.reportValidity(); return; }
            
            const clienteId = document.getElementById('m_cliente_id').value;
            const isEdit = clienteId && clienteId !== "";
            const url = isEdit ? `/clientes/ajax/${clienteId}/editar/` : '{% url "clientes:ajax_cliente_create" %}';
            
            const originalText = btnGuardar.innerHTML;
            btnGuardar.disabled = true;
            btnGuardar.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';
            
            fetch(url, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value }
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    if (window.Swal) Swal.fire({ icon: 'success', title: '¡Guardado!', text: data.message, timer: 1500, showConfirmButton: false });
                    
                    bootstrap.Modal.getInstance(document.getElementById('modalCliente')).hide();
                    document.dispatchEvent(new CustomEvent(isEdit ? 'clienteActualizado' : 'clienteCreado', { detail: data }));
                    
                    if (window.location.pathname.includes('/clientes/')) setTimeout(() => window.location.reload(), 1000);
                } else {
                    if (window.Swal) Swal.fire('Error', data.message, 'error');
                }
            })
            .catch(() => { if (window.Swal) Swal.fire('Error', 'No se pudo comunicar con el servidor', 'error'); })
            .finally(() => { btnGuardar.disabled = false; btnGuardar.innerHTML = originalText; });
        });
    }

    // Formateo de RUT
    const rutInput = document.getElementById('m_cliente_rut');
    if (rutInput) {
        rutInput.addEventListener('input', function(e) {
            let v = e.target.value.replace(/\./g, '').replace('-', '');
            if (v.length > 9) v = v.slice(0, 9);
            if (v.length > 1) {
                const body = v.slice(0, -1);
                const dv = v.slice(-1).toUpperCase();
                e.target.value = body.replace(/\B(?=(\d{3})+(?!\d))/g, '.') + '-' + dv;
            }
        });
    }
});
</script>
